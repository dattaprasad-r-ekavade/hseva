<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Shift / Roster</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/app-common.css" rel="stylesheet">
  <link href="../assets/css/shift-roster.css" rel="stylesheet">
</head>
<body class="hr-header-loading">
<div class="container py-4">
  <h4 class="mb-3">My Shift / Roster</h4>
  <div class="glass p-3 mb-3"><div id="todayCard"></div></div>
  <div class="glass p-3 mb-3"><div class="row g-2 align-items-end"><div class="col-md-3"><label class="form-label">Emp ID</label><input id="empId" class="form-control" placeholder="Auto from login or query"></div><div class="col-md-3"><label class="form-label">From</label><input id="fromDate" type="date" class="form-control"></div><div class="col-md-3"><label class="form-label">To</label><input id="toDate" type="date" class="form-control"></div><div class="col-md-3"><button id="btnLoad" class="btn btn-primary w-100">Load</button></div></div></div>
  <div class="table-responsive glass p-3"><table class="table table-striped"><thead><tr><th>Date</th><th>Day</th><th>Shift Code</th><th>Shift Name</th><th>Start</th><th>End</th><th>Type</th></tr></thead><tbody id="myShiftBody"></tbody></table></div>
</div>
<script src="../assets/js/app-common.js"></script>
<script src="../assets/js/my-shift-roster.js"></script>
</body>
</html>
